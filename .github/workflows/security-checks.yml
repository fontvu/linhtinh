name: Security Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_PASSCODE_HASH: ${{ secrets.VITE_PASSCODE_HASH }}
      VITE_PASSCODE_HINT: ${{ secrets.VITE_PASSCODE_HINT }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sanity check passcode
        env:
          VITE_PASSCODE_HASH: ${{ secrets.VITE_PASSCODE_HASH }}
        run: |
          node -e "const crypto=require('crypto'); const h=crypto.createHash('sha256').update('060804').digest('hex'); if(h!==process.env.VITE_PASSCODE_HASH){console.error('PASSCODE MISMATCH'); process.exit(2);} console.log('PASSCODE OK')"

      - name: Run tests
        run: npm run test:run

  audit:
    runs-on: ubuntu-latest
    env:
      VITE_PASSCODE_HASH: ${{ secrets.VITE_PASSCODE_HASH }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for high/critical vulnerabilities
        run: |
          if npm audit --audit-level=high --json | jq -e '.metadata.vulnerabilities.high > 0 or .metadata.vulnerabilities.critical > 0'; then
            echo "⚠️  High or critical vulnerabilities found"
            npm audit --audit-level=high
            exit 1
          else
            echo "✅ No high or critical vulnerabilities"
          fi
